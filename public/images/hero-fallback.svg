<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 280" width="440" height="280">
  <rect width="440" height="280" fill="#f5f4f2" rx="20"/>
  <!-- France map shape (simplified) -->
  <g transform="translate(40, 60)">
    <path d="M 20 0 L 60 0 L 80 15 L 90 35 L 80 65 L 60 80 L 40 90 L 10 75 L 0 50 L 5 20 Z" fill="#e0ddd9" stroke="#2f3e3a" stroke-width="1.5" opacity="0.8"/>
    <text x="45" y="110" font-family="Geist, sans-serif" font-size="11" font-weight="300" fill="#898989" text-anchor="middle" letter-spacing="-0.5">France et DROM-TOM</text>
  </g>
  <!-- Spain map shape (simplified) -->
  <g transform="translate(300, 70)">
    <path d="M 0 20 L 15 5 L 55 0 L 85 10 L 100 30 L 90 60 L 70 75 L 40 70 L 10 55 Z" fill="#e0ddd9" stroke="#2f3e3a" stroke-width="1.5" opacity="0.8"/>
    <text x="50" y="100" font-family="Geist, sans-serif" font-size="11" font-weight="300" fill="#898989" text-anchor="middle" letter-spacing="-0.5">Espagne</text>
  </g>
  <!-- Arc from France to Spain -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c1af95"/>
    </marker>
  </defs>
  <path d="M 145 95 Q 220 30 295 95" stroke="#c1af95" stroke-width="2" fill="none" stroke-dasharray="6 3" marker-end="url(#arrowhead)"/>
  <!-- Bourbon Academy label -->
  <text x="220" y="240" font-family="Geist, sans-serif" font-size="13" font-weight="500" fill="#2f3e3a" text-anchor="middle" letter-spacing="-0.5">Bourbon Academy</text>
</svg>
